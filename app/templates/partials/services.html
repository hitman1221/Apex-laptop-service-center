<section id="services" class="services-section section-padding">
    <div class="container">
        <div class="section-heading" data-aos="fade-up">
            <span class="section-eyebrow">Our Services</span>

            <h2 class="section-title">Laptop Repair Services</h2>

            <p class="section-description">
                Explore common laptop and computer issues for which customers can
                request inspection and repair assistance.
            </p>
        </div>

        <div class="row g-4">
            {% for service in services %}
                <div
                    class="col-lg-4 col-md-6"
                    data-aos="zoom-in"
                    data-aos-delay="{{ loop.index0 * 70 }}"
                >
                    <article class="service-card h-100">
                        <div class="service-icon" aria-hidden="true">
                            <i class="fa-solid {{ service.icon }}"></i>
                        </div>

                        <h3>{{ service.title }}</h3>
                        <p>{{ service.description }}</p>
                    </article>
                </div>
            {% endfor %}
        </div>
    </div>
</section>
